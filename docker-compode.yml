version: '3.8'

services:
  app:
    image: portfolio-app
    container_name: devops-app
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - devops-net

  mysql:
    image: mysql:8.0
    container_name: devops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: portfolio
      MYSQL_USER: user
      MYSQL_PASSWORD: pass
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - devops-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: devops-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8082:80"
    depends_on:
      - mysql
    networks:
      - devops-net

volumes:
  mysql_data:

networks:
  devops-net:
    driver: bridge
